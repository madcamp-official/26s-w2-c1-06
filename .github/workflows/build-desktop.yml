name: Build Desktop Apps

# 수동 트리거 전용 — 태그/푸시마다 자동으로 데스크톱 빌드+릴리스를 만들 필요는 없고,
# 필요할 때(README 다운로드 링크 갱신 등)만 명시적으로 돌린다.
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            script: build:mac
            artifact: mac
          - os: windows-latest
            script: build:win
            artifact: win
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm ci

      # 배포판은 진짜 OpenAI/Gemini 키를 절대 갖지 않는다(src/ai/createAIProvider.ts) —
      # 대신 Vercel 프록시 토큰만 담아, 설치 즉시 프록시를 거쳐 OpenAI/Gemini에 연결된다.
      # 이 토큰들은 소스(public 리포)에 절대 커밋하지 않고, 암호화된 GitHub Actions
      # 시크릿(ENV_PRODUCTION)에만 두었다가 빌드 시점에 .env.production으로 풀어 쓴다 —
      # electron-builder.yml의 extraResources가 이 파일을 배포 산출물에 번들한다.
      # 시크릿이 없는 환경(포크 등)에선 빈 placeholder로 폴백해 빌드만 통과하고 AI는
      # MockAIProvider로 자동 대체된다.
      - name: Write .env.production (proxy tokens from encrypted secret)
        shell: bash
        env:
          ENV_PRODUCTION: ${{ secrets.ENV_PRODUCTION }}
        run: |
          if [ -n "$ENV_PRODUCTION" ]; then
            printf '%s\n' "$ENV_PRODUCTION" > .env.production
            echo "Wrote .env.production from ENV_PRODUCTION secret."
          else
            cp .env.production.example .env.production
            echo "ENV_PRODUCTION secret not set — using empty placeholder (AI falls back to Mock)."
          fi

      # electron-builder는 CI 환경을 자동 감지해 빌드 후 알아서 GitHub에 퍼블리시하려
      # 시도한다(GH_TOKEN 없으면 그 자리에서 실패) — 이 job은 산출물만 만들고, 맥/윈도우
      # 두 산출물을 하나의 릴리스로 합치는 건 아래 release job이 명시적으로 한다.
      - run: npm run ${{ matrix.script }} -- --publish=never

      - uses: actions/upload-artifact@v4
        with:
          name: factcoding-${{ matrix.artifact }}
          path: |
            dist/*.dmg
            dist/*.exe
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist-artifacts

      - name: Create GitHub release with build artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="v0.1.0-build.${{ github.run_number }}"
          gh release create "$TAG" \
            dist-artifacts/factcoding-mac/*.dmg \
            dist-artifacts/factcoding-win/*.exe \
            --repo "${{ github.repository }}" \
            --title "Factcoding $TAG" \
            --notes "Factcoding Windows 및 macOS용 프로그램 파일입니다. 설치 후 바로 AI 기능(구조도 해설·강의노트·Q&A)이 동작합니다. 서명되지 않은 빌드라 처음 실행 시 보안 경고가 뜰 수 있습니다(macOS: 우클릭 후 '열기', Windows: '추가 정보' → '실행')."
          echo "RELEASE_TAG=$TAG" >> "$GITHUB_ENV"
